# Citonyx — Target Query Panel
#
# This file is the set of TARGETS for the Citonyx measurement experiment.
# Each entry is a question a real person might ask an AI answer engine
# (ChatGPT, Perplexity, Google AI Overviews, Gemini) on a topic where this
# site would want to be CITED. These prompts are the experiment's inputs:
# later sprints run each prompt against each platform (N>=3 times) and record
# whether the site was cited (see runs/schema.json).
#
# Categories (exactly one per prompt):
#   definitional  - "what is X" / conceptual explainer queries
#   commercial    - buyer-intent / tool / service / comparison queries
#   technical     - how-to / implementation / markup / structure queries
#   measurement   - tracking, metrics, correlation, ROI queries
#
# NOTE: prompts are intentionally NOT self-referential (no "what is Citonyx").

