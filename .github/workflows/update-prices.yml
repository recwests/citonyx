name: Update prices & deploy

on:
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Scrape Vast.ai prices
        run: npx -y tsx scripts/scrape.ts
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}

      - run: npm test

      - name: Commit if prices changed
        id: commit
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add src/data/prices.json
          if git diff --staged --quiet; then
            echo "No price change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: daily price refresh"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        run: npx -y wrangler@latest pages deploy dist --project-name ai-compute-compare --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
